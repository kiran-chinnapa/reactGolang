name: reactgolang-debug

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.debug
    working_dir: /app
    environment:
      PORT: "8080"
    volumes:
      - ./backend:/app
    ports:
      - "8081:8080"
      - "2345:2345"

  web:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: "http://api:8080"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - reactgolang_frontend_node_modules:/app/node_modules
    ports:
      - "5174:5173"

volumes:
  reactgolang_frontend_node_modules:
